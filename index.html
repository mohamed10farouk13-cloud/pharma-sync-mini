<body class="bg-dark text-light p-3">
  <div class="container-fluid" style="max-width: 500px; margin: auto;">
      <header class="d-flex justify-content-between align-items-center mb-4 pt-2">

            </div>div>
            <div id="connectionStatus" class="status-dot online"></div>div>
      </header>header>
  
      <div class="search-box mb-4">
            <div class="input-group shadow-sm">
                    <span class="input-group-text bg-dark border-info text-info"><i class="fas fa-search"></i>i></span>span>
                    <input type="text" id="itemSearch" list="inventoryList" class="form-control bg-dark border-info text-white" placeholder="Search product...">
                    <datalist id="inventoryList"></datalist>datalist>
            </div>div>
            <div id="selectedItemInfo" class="card bg-secondary mt-2 border-info d-none shadow">

                              <div>
                                            <div id="currentName" class="fw-bold text-white">Product Name</div>

            </div>

                </div>

                          <span>TOTAL:</span>
                        <span class="fs-5"><span id="totalDisplay">0.00</span> EGP</span>
                </div>
              <div class="btn-group-vertical w-100 gap-2">

                      <button id="clearCart" class="btn btn-sm text-danger border-0 bg-transparent">CLEAR CART</button>button>

  <script>
